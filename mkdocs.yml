site_name: Montana Meshtastic Community
theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png
  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

site_url: https://montanamesh.com
repo_name: montanamesh-site
repo_url: https://github.com/Montana-Meshtastic-Community/montanamesh-site

plugins:
  - offline
  - search

markdown_extensions: 
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - assets/js/nodeData.js # Node Info


extra_css:
  - styles/catppuccin.css


copyright: Copyright &copy; 2025 Montana Meshtastic Community
extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/SKmsDCraTV
    - icon: fontawesome/brands/github
      link: https://github.com/Montana-Meshtastic-Community
